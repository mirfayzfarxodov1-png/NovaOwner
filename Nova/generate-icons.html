<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA Icon Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #ff0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        .icon-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .icon-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #ff000030;
            transition: transform 0.3s;
        }
        .icon-card:hover {
            transform: translateY(-5px);
            border-color: #ff0000;
        }
        .icon-card canvas {
            display: block;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-radius: 12px;
        }
        .size {
            font-size: 14px;
            font-weight: 600;
            color: #ff0000;
            margin-bottom: 10px;
        }
        button {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff0000, #cc0000);
        }
        .btn-secondary {
            background: #333;
        }
        .success {
            color: #00cc00;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>🎨 NOVA Icon Generator</h1>
    <p class="subtitle">PWA uchun barcha o'lchamdagi ikonkalarni yaratish</p>
    
    <div class="icon-grid" id="iconGrid"></div>
    
    <div class="btn-group">
        <button class="btn-primary" id="downloadAll">📦 ZIP fayl sifatida yuklab olish</button>
        <button class="btn-secondary" id="generateManifest">📄 Manifest.json yaratish</button>
    </div>
    
    <div id="successMsg" class="success">✅ Yuklab olish boshlandi!</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // Barcha o'lchamlar
        const sizes = [72, 96, 128, 144, 152, 192, 256, 384, 512];
        
        // Ikonka yaratish funksiyasi
        function drawIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            const centerX = size / 2;
            const centerY = size / 2;
            
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#ff0000');
            gradient.addColorStop(1, '#cc0000');
            
            // Rounded rectangle
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, size * 0.22);
            ctx.fill();
            
            // Border
            ctx.strokeStyle = 'rgba(255,68,68,0.5)';
            ctx.lineWidth = size * 0.015;
            ctx.beginPath();
            ctx.roundRect(size * 0.04, size * 0.04, size * 0.92, size * 0.92, size * 0.18);
            ctx.stroke();
            
            // Letter N
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${size * 0.44}px "Inter", "Segoe UI", Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('N', centerX, centerY);
            
            // Star decoration (for larger icons)
            if (size >= 128) {
                drawStar(ctx, size * 0.18, size * 0.18, size * 0.05, 5);
                drawStar(ctx, size - size * 0.18, size - size * 0.18, size * 0.05, 5);
            }
            
            // Bottom text
            if (size >= 144) {
                ctx.font = `${size * 0.11}px "Inter", "Segoe UI", Arial, sans-serif`;
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.fillText('NOVA', centerX, size * 0.85);
            }
            
            return canvas;
        }
        
        // Star drawing helper
        function drawStar(ctx, cx, cy, r, points) {
            ctx.beginPath();
            for (let i = 0; i < points * 2; i++) {
                const radius = i % 2 === 0 ? r : r * 0.4;
                const angle = (Math.PI * 2 * i) / (points * 2);
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fill();
        }
        
        // CanvasRenderingContext2D roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }
        
        // Display icons
        const grid = document.getElementById('iconGrid');
        const canvases = [];
        
        sizes.forEach(size => {
            const canvas = drawIcon(size);
            canvases.push({ canvas, size });
            
            const card = document.createElement('div');
            card.className = 'icon-card';
            
            const preview = document.createElement('canvas');
            preview.width = 64;
            preview.height = 64;
            preview.getContext('2d').drawImage(canvas, 0, 0, 64, 64);
            
            card.innerHTML = `
                <div style="margin-bottom: 10px;"></div>
                <div class="size">${size}x${size}</div>
                <button class="download-single" data-size="${size}">⬇️ Yuklab olish</button>
            `;
            card.querySelector('div:first-child').appendChild(preview);
            grid.appendChild(card);
        });
        
        // Single download
        document.querySelectorAll('.download-single').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const size = parseInt(btn.dataset.size);
                const canvas = drawIcon(size);
                const link = document.createElement('a');
                link.download = `icon-${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                const msg = document.getElementById('successMsg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 2000);
            });
        });
        
        // Download all as ZIP
        document.getElementById('downloadAll').addEventListener('click', () => {
            const zip = new JSZip();
            const iconsFolder = zip.folder('icons');
            
            sizes.forEach(size => {
                const canvas = drawIcon(size);
                const dataURL = canvas.toDataURL('image/png');
                const base64 = dataURL.split(',')[1];
                iconsFolder.file(`icon-${size}.png`, base64, { base64: true });
            });
            
            // Add favicon.ico
            const faviconCanvas = drawIcon(64);
            const faviconData = faviconCanvas.toDataURL('image/png').split(',')[1];
            iconsFolder.file('favicon.png', faviconData, { base64: true });
            
            zip.generateAsync({ type: 'blob' }).then(content => {
                const link = document.createElement('a');
                link.download = 'nova-icons.zip';
                link.href = URL.createObjectURL(content);
                link.click();
                
                const msg = document.getElementById('successMsg');
                msg.textContent = '✅ ZIP fayl yuklab olindi!';
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000);
            });
        });
        
        // Generate manifest.json
        document.getElementById('generateManifest').addEventListener('click', () => {
            const manifest = {
                name: "NOVA Social",
                short_name: "NOVA",
                description: "Dunyodagi eng kuchli super ilova",
                start_url: "/",
                display: "standalone",
                theme_color: "#ff0000",
                background_color: "#000000",
                orientation: "portrait",
                scope: "/",
                lang: "uz",
                icons: sizes.map(size => ({
                    src: `assets/icons/icon-${size}.png`,
                    sizes: `${size}x${size}`,
                    type: "image/png",
                    purpose: "any maskable"
                })),
                shortcuts: [
                    {
                        name: "Bosh sahifa",
                        short_name: "Home",
                        url: "/",
                        icons: [{ src: "assets/icons/icon-96.png", sizes: "96x96" }]
                    },
                    {
                        name: "Video yuklash",
                        short_name: "Upload",
                        url: "/?upload=true",
                        icons: [{ src: "assets/icons/icon-96.png", sizes: "96x96" }]
                    },
                    {
                        name: "Xabarlar",
                        short_name: "Chat",
                        url: "/?chat=true",
                        icons: [{ src: "assets/icons/icon-96.png", sizes: "96x96" }]
                    }
                ]
            };
            
            const blob = new Blob([JSON.stringify(manifest, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            link.download = 'manifest.json';
            link.href = URL.createObjectURL(blob);
            link.click();
            
            const msg = document.getElementById('successMsg');
            msg.textContent = '✅ manifest.json yuklab olindi!';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        });
    </script>
</body>
</html>
