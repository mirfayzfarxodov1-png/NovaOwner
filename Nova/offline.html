<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - NOVA</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
        .container{max-width:400px}
        .icon{font-size:80px;margin-bottom:20px}
        h1{font-size:28px;margin-bottom:10px;background:linear-gradient(135deg,#fff,#ff0000);-webkit-background-clip:text;background-clip:text;color:transparent}
        p{color:#888;margin-bottom:20px}
        button{background:#ff0000;color:#fff;border:none;padding:12px 30px;border-radius:30px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Internet aloqasi yo'q</h1>
        <p>Iltimos, internet aloqasini tekshiring va qayta urining.</p>
        <button onclick="location.reload()">🔄 Qayta urinish</button>
    </div>
</body>
</html>
