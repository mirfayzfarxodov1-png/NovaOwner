<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- Face circle -->
  <circle cx="50" cy="50" r="30" fill="#fff" fill-opacity="0.2"/>
  
  <!-- Eyes -->
  <circle cx="38" cy="45" r="5" fill="#fff"/>
  <circle cx="62" cy="45" r="5" fill="#fff"/>
  <circle cx="38" cy="45" r="2" fill="#000"/>
  <circle cx="62" cy="45" r="2" fill="#000"/>
  
  <!-- Smile -->
  <path d="M35 60 Q50 70 65 60" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Letter N on avatar -->
  <text x="50" y="92" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Arial">N</text>
</svg>
